<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTRAG - YouTube Transcript RAG</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #343541;
            min-height: 100vh;
            color: #ececf1;
        }
        
        .chat-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        .header {
            padding: 16px 20px;
            border-bottom: 1px solid #4e4f60;
            text-align: center;
        }
        
        .header h1 {
            color: #10a37f;
            font-size: 24px;
            margin-bottom: 4px;
        }
        
        .header p {
            color: #8e8ea0;
            font-size: 14px;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .message {
            margin-bottom: 24px;
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            background: #343541;
            padding: 16px 20px;
            border-radius: 8px;
        }
        
        .message.assistant {
            background: #444654;
            padding: 16px 20px;
            border-radius: 8px;
        }
        
        .message-label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #10a37f;
            font-size: 14px;
        }
        
        .message.user .message-label {
            color: #ececf1;
        }
        
        .message-content {
            line-height: 1.6;
            white-space: pre-wrap;
        }
        
        .sources-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #4e4f60;
        }
        
        .sources-title {
            font-weight: 600;
            color: #8e8ea0;
            font-size: 13px;
            margin-bottom: 8px;
        }
        
        .source-item {
            background: #2a2b32;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        
        .source-link {
            color: #10a37f;
            text-decoration: none;
            font-weight: 500;
        }
        
        .source-link:hover {
            text-decoration: underline;
        }
        
        .source-chunk {
            margin-top: 8px;
            color: #c5c5d2;
            font-size: 12px;
            line-height: 1.5;
            max-height: 100px;
            overflow-y: auto;
        }
        
        .metadata {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        
        .metadata-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }
        
        .metadata-label {
            color: #8e8ea0;
        }
        
        .metadata-value {
            font-weight: 500;
        }
        
        .confidence-high {
            color: #10a37f;
        }
        
        .confidence-medium {
            color: #f5a623;
        }
        
        .confidence-low {
            color: #ef4444;
        }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-pass {
            background: rgba(16, 163, 127, 0.2);
            color: #10a37f;
        }
        
        .status-refused {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        
        .status-error {
            background: rgba(245, 166, 35, 0.2);
            color: #f5a623;
        }
        
        .input-container {
            padding: 20px;
            border-top: 1px solid #4e4f60;
            background: #343541;
        }
        
        .input-wrapper {
            display: flex;
            gap: 12px;
            max-width: 900px;
            margin: 0 auto;
        }
        
        .question-input {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid #565869;
            border-radius: 8px;
            background: #40414f;
            color: #ececf1;
            font-size: 16px;
            resize: none;
            font-family: inherit;
        }
        
        .question-input:focus {
            outline: none;
            border-color: #10a37f;
        }
        
        .question-input::placeholder {
            color: #8e8ea0;
        }
        
        .submit-btn {
            background: #10a37f;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .submit-btn:hover {
            background: #0d8a6a;
        }
        
        .submit-btn:disabled {
            background: #565869;
            cursor: not-allowed;
        }
        
        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #8e8ea0;
        }
        
        .loading-dots {
            display: flex;
            gap: 4px;
        }
        
        .loading-dots span {
            width: 8px;
            height: 8px;
            background: #10a37f;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8e8ea0;
        }
        
        .empty-state h2 {
            color: #ececf1;
            margin-bottom: 8px;
        }
        
        .empty-state p {
            font-size: 14px;
        }
        
        .example-questions {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        
        .example-btn {
            background: #40414f;
            border: 1px solid #565869;
            color: #ececf1;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .example-btn:hover {
            background: #565869;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <h1>YTRAG</h1>
            <p>YouTube Transcript RAG - Ask questions about video content</p>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="empty-state" id="emptyState">
                <h2>Welcome to YTRAG</h2>
                <p>Ask questions about YouTube video transcripts and get AI-powered answers with sources.</p>
                <div class="example-questions">
                    <button class="example-btn" onclick="askExample('What is a neural network?')">What is a neural network?</button>
                    <button class="example-btn" onclick="askExample('How do transformers work?')">How do transformers work?</button>
                    <button class="example-btn" onclick="askExample('Explain backpropagation')">Explain backpropagation</button>
                </div>
            </div>
        </div>
        
        <div class="input-container">
            <div class="input-wrapper">
                <textarea 
                    class="question-input" 
                    id="questionInput" 
                    placeholder="Ask a question about the video transcripts..."
                    rows="1"
                    onkeydown="handleKeyDown(event)"
                ></textarea>
                <button class="submit-btn" id="submitBtn" onclick="processQuestion()">Send</button>
            </div>
        </div>
    </div>
    
    <script>
        const chatMessages = document.getElementById('chatMessages');
        const emptyState = document.getElementById('emptyState');
        const submitBtn = document.getElementById('submitBtn');
        const questionInput = document.getElementById('questionInput');
        
        // Auto-resize textarea
        questionInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });
        
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                processQuestion();
            }
        }
        
        function askExample(question) {
            questionInput.value = question;
            processQuestion();
        }
        
        function addMessage(content, isUser = false, metadata = null) {
            if (emptyState) {
                emptyState.remove();
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
            
            let html = `<div class="message-label">${isUser ? 'You' : 'YTRAG'}</div>`;
            html += `<div class="message-content">${content}</div>`;
            
            if (metadata) {
                html += `<div class="metadata">`;
                
                if (metadata.confidence) {
                    const confidenceClass = `confidence-${metadata.confidence}`;
                    html += `<div class="metadata-item">
                        <span class="metadata-label">Confidence:</span>
                        <span class="metadata-value ${confidenceClass}">${metadata.confidence.toUpperCase()}</span>
                    </div>`;
                }
                
                if (metadata.status) {
                    const statusClass = metadata.status === 'PASS' ? 'status-pass' : 
                                       (metadata.status === 'INSUFFICIENT_CONTEXT' ? 'status-refused' : 'status-error');
                    const statusText = metadata.status === 'PASS' ? 'Answered' : 
                                      (metadata.status === 'INSUFFICIENT_CONTEXT' ? 'Refused' : 'Error');
                    html += `<div class="metadata-item">
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    </div>`;
                }
                
                html += `</div>`;
            }
            
            messageDiv.innerHTML = html;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            return messageDiv;
        }
        
        function addSources(sources) {
            const lastMessage = chatMessages.lastElementChild;
            if (!lastMessage || !sources || sources.length === 0) return;
            
            const sourcesDiv = document.createElement('div');
            sourcesDiv.className = 'sources-section';
            
            let html = `<div class="sources-title">📚 Sources (${sources.length})</div>`;
            
            sources.forEach((source, index) => {
                const videoUrl = `https://www.youtube.com/watch?v=${source.video_id}`;
                html += `<div class="source-item">
                    <a href="${videoUrl}" target="_blank" class="source-link">${source.video_name}</a>
                    <div class="source-chunk">${source.chunk_text}</div>
                </div>`;
            });
            
            sourcesDiv.innerHTML = html;
            lastMessage.appendChild(sourcesDiv);
        }
        
        function addLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.id = 'loadingMessage';
            loadingDiv.innerHTML = `
                <div class="message-label">YTRAG</div>
                <div class="loading">
                    <div class="loading-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <span>Searching transcripts and generating answer...</span>
                </div>
            `;
            chatMessages.appendChild(loadingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function removeLoading() {
            const loadingMessage = document.getElementById('loadingMessage');
            if (loadingMessage) {
                loadingMessage.remove();
            }
        }
        
        async function processQuestion() {
            const question = questionInput.value.trim();
            if (!question) {
                return;
            }
            
            // Add user message
            addMessage(question, true);
            
            // Clear input
            questionInput.value = '';
            questionInput.style.height = 'auto';
            
            // Disable button and show loading
            submitBtn.disabled = true;
            addLoading();
            
            try {
                // Step 1: Retrieve chunks
                const retrieveResponse = await fetch('/retrieve', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ question: question })
                });
                
                const retrieveData = await retrieveResponse.json();
                
                if (retrieveData.error) {
                    removeLoading();
                    addMessage(`Error: ${retrieveData.error}`, false, { status: 'ERROR' });
                    return;
                }
                
                // Step 2: Generate answer
                const answerResponse = await fetch('/generate_answer', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        question: question,
                        retrieved_chunk: retrieveData.retrieved_chunk,
                        video_id: retrieveData.video_id,
                        source: retrieveData.source
                    })
                });
                
                const answerData = await answerResponse.json();
                
                // Remove loading and add answer
                removeLoading();
                
                const metadata = {
                    confidence: answerData.confidence,
                    status: answerData.validation?.status || 'UNKNOWN'
                };
                
                addMessage(answerData.answer, false, metadata);
                
                // Add sources if available (prefer answerData.sources, fallback to retrieveData.sources)
                if (answerData.sources && answerData.sources.length > 0) {
                    addSources(answerData.sources);
                } else if (retrieveData.sources && retrieveData.sources.length > 0) {
                    addSources(retrieveData.sources);
                } else if (retrieveData.retrieved_chunk) {
                    // Fallback: create source from retrieved chunk
                    addSources([{
                        video_id: retrieveData.video_id || 'unknown',
                        video_name: retrieveData.source || 'Unknown Source',
                        chunk_text: retrieveData.retrieved_chunk
                    }]);
                }
                
            } catch (error) {
                console.error('Error:', error);
                removeLoading();
                addMessage('An error occurred while processing your question. Please try again.', false, { status: 'ERROR' });
            } finally {
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
