<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTRAG - RAG QA System</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #4fc3f7;
        }
        
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        
        .input-section {
            background: #1e1e2f;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #4fc3f7;
            font-weight: 500;
        }
        
        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #2a2a3e;
            color: #fff;
            font-size: 16px;
        }
        
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #4fc3f7;
        }
        
        .options-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .options-row > div {
            flex: 1;
            min-width: 200px;
        }
        
        button {
            background: linear-gradient(135deg, #4fc3f7 0%, #2196f3 100%);
            color: #fff;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(79, 195, 247, 0.4);
        }
        
        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }
        
        .results-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 768px) {
            .results-section {
                grid-template-columns: 1fr;
            }
        }
        
        .result-card {
            background: #1e1e2f;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .result-card h3 {
            color: #4fc3f7;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        
        .chunk-content, .answer-content {
            background: #2a2a3e;
            padding: 15px;
            border-radius: 8px;
            white-space: pre-wrap;
            line-height: 1.6;
            max-height: 300px;
            overflow-y: auto;
            font-size: 14px;
        }
        
        .validation-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #1e1e2f;
        }
        
        .validation-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #333;
        }
        
        .validation-item:last-child {
            border-bottom: none;
        }
        
        .status-pass {
            color: #4caf50;
            font-weight: bold;
        }
        
        .status-fail {
            color: #f44336;
            font-weight: bold;
        }
        
        .hidden {
            display: none;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #888;
        }
        
        .source-tag {
            display: inline-block;
            background: #3d5afe;
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 YTRAG</h1>
        <p class="subtitle">YouTube Transcript RAG Question Answering System</p>
        
        <div class="input-section">
            <div class="form-group">
                <label for="question">Question:</label>
                <input type="text" id="question" placeholder="Enter your question about the video content...">
            </div>
            
            <button id="submitBtn" onclick="processQuestion()">Get Answer</button>
        </div>
        
        <div class="results-section hidden" id="resultsSection">
            <div class="result-card">
                <h3>📄 Retrieved Chunk</h3>
                <span class="source-tag" id="chunkSource"></span>
                <div class="chunk-content" id="retrievedChunk"></div>
            </div>
            
            <div class="result-card">
                <h3>💡 Generated Answer</h3>
                <div class="answer-content" id="generatedAnswer"></div>
                
                <div class="validation-box">
                    <h4>✅ Validation Result</h4>
                    <div class="validation-item">
                        <span>Keyword Coverage:</span>
                        <span id="keywordCoverage">--</span>
                    </div>
                    <div class="validation-item">
                        <span>Relevant Sentences:</span>
                        <span id="relevantSentences">--</span>
                    </div>
                    <div class="validation-item">
                        <span>Confidence:</span>
                        <span id="confidence">--</span>
                    </div>
                    <div class="validation-item">
                        <span>Answer Format:</span>
                        <span id="answerFormat">--</span>
                    </div>
                    <div class="validation-item">
                        <span>Has Answer:</span>
                        <span id="hasAnswer">--</span>
                    </div>
                    <div class="validation-item">
                        <span>Status:</span>
                        <span id="validationStatus">--</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="loading hidden" id="loading"></div>
    </div>
    
    <script>
        const submitBtn = document.getElementById('submitBtn');
        const resultsSection = document.getElementById('resultsSection');
        
        async function processQuestion() {
            const question = document.getElementById('question').value.trim();
            if (!question) {
                alert('Please enter a question');
                return;
            }
            
            // Show loading
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';
            resultsSection.classList.add('hidden');
            
            try {
                // Step 1: Retrieve chunk (auto-select)
                const retrieveResponse = await fetch('/retrieve', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        question: question
                    })
                });
                
                const retrieveData = await retrieveResponse.json();
                
                if (retrieveData.error) {
                    alert(retrieveData.error);
                    return;
                }
                
                // Step 2: Generate answer
                const answerResponse = await fetch('/generate_answer', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        question: question,
                        retrieved_chunk: retrieveData.retrieved_chunk
                    })
                });
                
                const answerData = await answerResponse.json();
                
                // Display results
                document.getElementById('chunkSource').textContent = retrieveData.source + ' (method: ' + retrieveData.method + ')';
                document.getElementById('retrievedChunk').textContent = retrieveData.retrieved_chunk;
                document.getElementById('generatedAnswer').textContent = answerData.answer;
                
                // Validation display
                document.getElementById('keywordCoverage').textContent = answerData.validation.keyword_coverage + '%';
                document.getElementById('relevantSentences').textContent = answerData.validation.relevant_sentences_found;
                document.getElementById('hasAnswer').textContent = answerData.validation.has_answer ? '✓ Yes' : '✗ No';
                
                const statusEl = document.getElementById('validationStatus');
                statusEl.textContent = answerData.validation.status;
                statusEl.className = answerData.validation.status === 'PASS' ? 'status-pass' : 'status-fail';
                
                // Show confidence
                const confidenceEl = document.getElementById('confidence');
                confidenceEl.textContent = answerData.confidence;
                confidenceEl.className = answerData.confidence === 'high' ? 'status-pass' : (answerData.confidence === 'medium' ? 'status-fail' : ''); // Reusing status classes, medium in yellow would be better but using existing classes
                confidenceEl.style.color = answerData.confidence === 'high' ? '#4caf50' : (answerData.confidence === 'medium' ? '#ff9800' : '#f44336');
                
                // Show answer format
                document.getElementById('answerFormat').textContent = answerData.answer_format;
                
                resultsSection.classList.remove('hidden');
                
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred. Please check the console for details.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Get Answer';
            }
        }
    </script>
</body>
</html>
